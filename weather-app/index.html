<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #1a1a2e;
      --bg-end: #16213e;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --text-primary: #f0f4ff;
      --text-secondary: rgba(240,244,255,0.6);
      --accent: #7eb8f7;
      --toggle-bg: rgba(255,255,255,0.1);
      --toggle-active: rgba(255,255,255,0.22);
      --error-bg: rgba(255,90,90,0.12);
      --error-border: rgba(255,90,90,0.35);
      --error-text: #ffadad;
      --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      transition: background var(--transition);
    }

    /* Dynamic backgrounds */
    body.weather-clear    { --bg-start: #1c1410; --bg-end: #3d2b0f; }
    body.weather-clouds   { --bg-start: #1a1e2e; --bg-end: #2a3045; }
    body.weather-rain,
    body.weather-drizzle  { --bg-start: #0d1821; --bg-end: #1a2e3a; }
    body.weather-snow     { --bg-start: #1a2030; --bg-end: #2a3550; }
    body.weather-storm    { --bg-start: #0d0d1a; --bg-end: #1a1030; }
    body.weather-mist,
    body.weather-fog,
    body.weather-haze     { --bg-start: #1e1e22; --bg-end: #2c2c35; }
    body.weather-default  { --bg-start: #1a1a2e; --bg-end: #16213e; }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.06) inset;
      color: var(--text-primary);
    }

    /* ── Header row ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text-secondary);
    }

    /* ── Unit toggle ── */
    .unit-toggle {
      display: flex;
      background: var(--toggle-bg);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--card-border);
      flex-shrink: 0;
    }

    .unit-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      outline-offset: 2px;
    }

    .unit-btn.active {
      background: var(--toggle-active);
      color: var(--text-primary);
    }

    .unit-btn:hover:not(.active) { color: var(--text-primary); }
    .unit-btn:focus-visible { outline: 2px solid var(--accent); }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
    }

    .search-label { /* visually hidden */
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    .search-input::placeholder { color: var(--text-secondary); }

    .search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.1);
    }

    .search-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #0d1b2e;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      transition: opacity var(--transition), transform 0.1s;
      white-space: nowrap;
      outline-offset: 2px;
    }

    .search-btn:hover { opacity: 0.88; }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:focus-visible { outline: 2px solid var(--text-primary); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error message ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 10px;
      color: var(--error-text);
      font-size: 0.87rem;
      padding: 10px 14px;
      margin-top: 10px;
      animation: fadeIn 0.25s ease;
    }

    .error-msg.visible { display: flex; }

    /* ── Loading spinner ── */
    .loader {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 32px 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .loader.visible { display: flex; }

    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    /* ── Weather results ── */
    .weather-result {
      display: none;
      flex-direction: column;
      gap: 0;
      animation: fadeIn 0.45s ease;
    }

    .weather-result.visible { display: flex; }

    /* Location + time header */
    .location-header {
      margin-top: 22px;
      text-align: center;
    }

    .city-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .local-time {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Main temperature display */
    .temp-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 20px 0 8px;
      gap: 4px;
    }

    .weather-icon-img {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .temp-value {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      transition: opacity 0.25s ease;
    }

    .temp-value.switching { opacity: 0; }

    .condition-label {
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: capitalize;
    }

    .feels-like {
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: opacity 0.25s ease;
    }

    .feels-like.switching { opacity: 0; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Divider between search and results */
    .divider {
      height: 1px;
      background: var(--card-border);
      margin: 24px 0 0;
      display: none;
    }

    .divider.visible { display: block; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 420px) {
      .card { padding: 24px 18px; }
      .temp-value { font-size: 4rem; }
      .city-name { font-size: 1.4rem; }
    }
  </style>
</head>
<body class="weather-default">

<main class="card" role="main">

  <!-- Header: title + unit toggle -->
  <header class="card-header">
    <span class="app-title">Weather</span>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn" id="btn-f" aria-pressed="true" onclick="setUnit('F')">°F</button>
      <button class="unit-btn" id="btn-c" aria-pressed="false" onclick="setUnit('C')">°C</button>
    </div>
  </header>

  <!-- Search -->
  <label for="city-input" class="search-label">City name</label>
  <div class="search-row">
    <input
      id="city-input"
      class="search-input"
      type="text"
      placeholder="Search city…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      aria-label="City name"
    />
    <button class="search-btn" id="search-btn" onclick="handleSearch()" aria-label="Search weather">
      Search
    </button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg" role="alert" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.6"/>
      <path d="M10 6v5M10 13.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span id="error-text"></span>
  </div>

  <!-- Loading -->
  <div class="loader" id="loader" aria-live="polite" aria-label="Loading weather data">
    <div class="spinner" aria-hidden="true"></div>
    <span>Fetching weather…</span>
  </div>

  <!-- Divider -->
  <div class="divider" id="divider"></div>

  <!-- Results -->
  <section class="weather-result" id="weather-result" aria-label="Weather results">

    <div class="location-header">
      <div class="city-name" id="city-display"></div>
      <div class="local-time" id="local-time"></div>
    </div>

    <div class="temp-display">
      <img class="weather-icon-img" id="weather-icon" src="" alt="" />
      <div class="temp-value" id="temp-value"></div>
      <div class="condition-label" id="condition-label"></div>
      <div class="feels-like" id="feels-like"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="stat-humidity"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="stat-wind"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="stat-visibility"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Feels Like</div>
        <div class="stat-value" id="stat-feels"></div>
      </div>
    </div>

  </section>

</main>

<script>
  const API_KEY = '678b2eb65d5418a4fb7267e72bed63d7';
  const API_URL = 'https://api.openweathermap.org/data/2.5/weather';

  let currentData = null;
  let unit = localStorage.getItem('weatherUnit') || 'F';

  // ── Init ──────────────────────────────────────────────────────────────────
  (function init() {
    applyUnit();
    document.getElementById('city-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });
  })();

  // ── Unit toggle ───────────────────────────────────────────────────────────
  function setUnit(u) {
    if (u === unit) return;
    unit = u;
    localStorage.setItem('weatherUnit', unit);
    applyUnit();
    if (currentData) updateDisplay();
  }

  function applyUnit() {
    const btnF = document.getElementById('btn-f');
    const btnC = document.getElementById('btn-c');
    btnF.classList.toggle('active', unit === 'F');
    btnC.classList.toggle('active', unit === 'C');
    btnF.setAttribute('aria-pressed', unit === 'F' ? 'true' : 'false');
    btnC.setAttribute('aria-pressed', unit === 'C' ? 'true' : 'false');
  }

  // ── Conversion ────────────────────────────────────────────────────────────
  function toDisplay(celsius) {
    if (unit === 'F') return Math.round((celsius * 9 / 5) + 32);
    return Math.round(celsius);
  }

  function unitSymbol() { return unit === 'F' ? '°F' : '°C'; }

  function windDisplay(mps) {
    // API returns m/s (metric); convert to km/h or mph
    if (unit === 'F') return `${Math.round(mps * 2.237)} mph`;
    return `${Math.round(mps * 3.6)} km/h`;
  }

  function visDisplay(meters) {
    if (unit === 'F') return `${(meters / 1609.34).toFixed(1)} mi`;
    return `${(meters / 1000).toFixed(1)} km`;
  }

  // ── Weather group → body class ────────────────────────────────────────────
  function bgClass(weatherMain) {
    const m = weatherMain.toLowerCase();
    if (m === 'clear') return 'weather-clear';
    if (m === 'clouds') return 'weather-clouds';
    if (m === 'rain') return 'weather-rain';
    if (m === 'drizzle') return 'weather-drizzle';
    if (m === 'snow') return 'weather-snow';
    if (['thunderstorm', 'tornado'].includes(m)) return 'weather-storm';
    if (['mist', 'smoke', 'haze', 'dust', 'fog', 'sand', 'ash', 'squall'].includes(m)) return 'weather-mist';
    return 'weather-default';
  }

  // ── Local time from timezone offset ──────────────────────────────────────
  function localTime(timezoneOffset) {
    const utcMs = Date.now() + new Date().getTimezoneOffset() * 60000;
    const localMs = utcMs + timezoneOffset * 1000;
    const d = new Date(localMs);
    const day = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    const time = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    return `${day} · ${time}`;
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function handleSearch() {
    const input = document.getElementById('city-input');
    const city = input.value.trim();

    clearError();

    if (!city) {
      showError('Please enter a city name.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(
        `${API_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
      );

      if (res.status === 404) {
        showError('City not found. Please check the spelling and try again.');
        setLoading(false);
        return;
      }

      if (!res.ok) {
        showError('Something went wrong. Please try again later.');
        setLoading(false);
        return;
      }

      const data = await res.json();
      currentData = data;
      setLoading(false);
      renderResults();

    } catch (_) {
      showError('Something went wrong. Please try again later.');
      setLoading(false);
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderResults() {
    updateDisplay();

    // Show divider + results with animation
    document.getElementById('divider').classList.add('visible');
    const result = document.getElementById('weather-result');
    result.classList.remove('visible');
    // Force reflow for re-animation
    void result.offsetWidth;
    result.classList.add('visible');

    // Background
    const body = document.body;
    body.className = bgClass(currentData.weather[0].main);
  }

  function updateDisplay() {
    if (!currentData) return;

    const d = currentData;
    const tempC = d.main.temp;
    const feelsC = d.main.feels_like;

    // Animate temp value change
    const tempEl = document.getElementById('temp-value');
    const feelsEl = document.getElementById('feels-like');
    tempEl.classList.add('switching');
    feelsEl.classList.add('switching');

    setTimeout(() => {
      document.getElementById('city-display').textContent =
        `${d.name}, ${d.sys.country}`;
      document.getElementById('local-time').textContent =
        localTime(d.timezone);

      const iconCode = d.weather[0].icon;
      const iconEl = document.getElementById('weather-icon');
      iconEl.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
      iconEl.alt = d.weather[0].description;

      tempEl.textContent = `${toDisplay(tempC)}${unitSymbol()}`;
      document.getElementById('condition-label').textContent = d.weather[0].description;
      feelsEl.textContent = `Feels like ${toDisplay(feelsC)}${unitSymbol()}`;

      document.getElementById('stat-humidity').textContent = `${d.main.humidity}%`;
      document.getElementById('stat-wind').textContent = windDisplay(d.wind.speed);
      document.getElementById('stat-visibility').textContent = visDisplay(d.visibility);
      document.getElementById('stat-feels').textContent =
        `${toDisplay(feelsC)}${unitSymbol()}`;

      tempEl.classList.remove('switching');
      feelsEl.classList.remove('switching');
    }, 220);
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('loader').classList.toggle('visible', on);
    document.getElementById('search-btn').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('visible');
  }

  function clearError() {
    document.getElementById('error-msg').classList.remove('visible');
  }
</script>
</body>
</html>
